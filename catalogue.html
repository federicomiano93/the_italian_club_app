<!--
  THE ITALIAN CLUB PWA — Recipe catalogue
  Searchable recipe library; view a recipe, scale it by total weight in kg,
  add/edit/delete recipes, and import a recipe into the Calculator.
  All logic lives in js/catalogue/* (loaded via catalogue-main.js).
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!--
  CSP bootstrap. A <meta> Content-Security-Policy cannot be loosened at runtime
  (multiple policies combine by intersection), so to allow the LOCAL Firebase
  emulator on localhost WITHOUT touching the live site's policy, the meta is
  emitted here. On the live domain the string is byte-identical to the production
  policy; on localhost only, connect-src additionally allows the Auth (9099) and
  Firestore (8080) emulators. This inline script runs before any CSP is in effect
  (only <meta charset> precedes it) and before any network request.
-->
<script>
(function () {
  var local = ['localhost', '127.0.0.1', '::1', '[::1]'].indexOf(location.hostname) !== -1;
  var emu = local
    ? ' http://localhost:8080 http://localhost:9099 http://127.0.0.1:8080 http://127.0.0.1:9099'
    : '';
  document.write(
    '<meta http-equiv="Content-Security-Policy" content="' +
    "default-src 'self'; " +
    "script-src 'self' https://www.gstatic.com https://www.google.com; " +
    "connect-src 'self' https://www.gstatic.com https://www.google.com https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com" + emu + "; " +
    "frame-src 'self' https://www.google.com; " +
    "img-src 'self' data:; " +
    "style-src 'self'; " +
    "font-src 'self'" +
    '">'
  );
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Recipe catalogue for The Italian Club — search recipes and scale them to any dough weight in kg.">
<meta name="theme-color" content="#2D5016">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Italian Club">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="catalogue.css">
<title>Recipe catalogue — The Italian Club</title>
</head>
<body>

<!-- Three fixed tracks (left slot · title · right slot) so the title is TRULY
     centred: only one button of each slot is ever visible, and an empty slot must
     still hold its column or the title drifts off-centre. -->
<header class="cat-header">
  <span class="cat-header-slot">
    <a class="cat-icon-btn" id="catHome" href="index.html" aria-label="Back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <button class="cat-icon-btn" id="catBack" aria-label="Back" hidden>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
  </span>
  <div class="cat-header-title">
    <h1 id="catTitle">Recipes</h1>
    <p id="catSub">Recipe catalogue</p>
  </div>
  <span class="cat-header-slot">
    <button class="cat-icon-btn" id="catAdd" aria-label="New recipe">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="cat-icon-btn" id="catEdit" aria-label="Edit recipe" hidden>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
    </button>
  </span>
</header>

<main class="cat-screen" id="catScreen"></main>

<!-- The confirm dialog is built on demand by js/catalogue/confirm-dialog.js
     (the shared .app-dialog-* component), so no static markup is needed. -->

<div class="cat-toast" id="catToast"></div>

<script type="module" src="js/sw-update.js"></script>
<script type="module" src="js/idle-reset.js"></script>
<script type="module" src="js/catalogue/catalogue-main.js"></script>
<script type="module" src="js/hold-to-zoom.js"></script>
</body>
</html>
