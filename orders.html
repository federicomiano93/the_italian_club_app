<!--
  THE ITALIAN CLUB PWA — Orders
  Supplier-order workflow. Header + navigation + scroll area.
  All logic lives in js/orders/* (loaded via orders-main.js).
  Reuses style.css; new styles in orders.css.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com; img-src 'self' data:; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2D5016">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Italian Club">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="orders.css">
<title>Orders — The Italian Club</title>
</head>
<body>

<header class="orders-header">
  <a class="orders-icon-btn" href="home.html" aria-label="Back to home">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </a>
  <div class="orders-header-title">
    <h1>Orders</h1>
    <p>Weekly supplier order</p>
  </div>
  <button class="orders-icon-btn" id="orders-settings-btn" aria-label="Management panel">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</header>

<nav class="tab-bar" aria-label="Orders sections">
  <button class="tab active" id="tab-order-btn">Order</button>
  <button class="tab" id="tab-history-btn">History</button>
</nav>

<div class="scroll-area">

  <!-- ORDER -->
  <section class="content active" id="tab-order">
    <p class="orders-status" id="orders-status">Connecting…</p>
    <div id="suppliers-list"></div>
  </section>

  <!-- HISTORY -->
  <section class="content" id="tab-history">
    <div id="history-list"></div>
  </section>

</div>

<script type="module" src="js/orders/boot.js"></script>
<script type="module" src="js/orders/orders-main.js"></script>
</body>
</html>
