<!--
  THE ITALIAN CLUB PWA — Orders
  Supplier-order workflow. Header + navigation + scroll area.
  All logic lives in js/orders/* (loaded via orders-main.js).
  Reuses style.css; new styles in orders.css.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!--
  CSP bootstrap. A <meta> Content-Security-Policy cannot be loosened at runtime
  (multiple policies combine by intersection), so to allow the LOCAL Firebase
  emulator on localhost WITHOUT touching the live site's policy, the meta is
  emitted here. On the live domain the string is byte-identical to the production
  policy (gov.uk kept for the bank-holiday calendar); on localhost only, connect-src
  additionally allows the Auth (9099) and Firestore (8080) emulators. This inline
  script runs before any CSP is in effect (only <meta charset> precedes it) and
  before any network request.
-->
<script>
(function () {
  var local = ['localhost', '127.0.0.1', '::1', '[::1]'].indexOf(location.hostname) !== -1;
  var emu = local
    ? ' http://localhost:8080 http://localhost:9099 http://127.0.0.1:8080 http://127.0.0.1:9099'
    : '';
  document.write(
    '<meta http-equiv="Content-Security-Policy" content="' +
    "default-src 'self'; " +
    "script-src 'self' https://www.gstatic.com https://www.google.com; " +
    "connect-src 'self' https://www.gstatic.com https://www.google.com https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://www.gov.uk" + emu + "; " +
    "frame-src 'self' https://www.google.com; " +
    "img-src 'self' data:; " +
    "style-src 'self'; " +
    "font-src 'self'" +
    '">'
  );
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Weekly supplier orders for The Italian Club bakery — plan and send ingredient orders.">
<meta name="theme-color" content="#2D5016">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Italian Club">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="orders.css">
<title>Orders — The Italian Club</title>
</head>
<body>

<header class="orders-header">
  <a class="orders-icon-btn" href="index.html" aria-label="Back">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </a>
  <div class="orders-header-title">
    <h1>Orders</h1>
    <p>Weekly supplier order</p>
  </div>
  <button class="orders-icon-btn" id="orders-wa-btn" type="button" aria-label="Send order on WhatsApp">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </button>
</header>

<nav class="tab-bar" aria-label="Orders sections">
  <button class="tab active" id="tab-order-btn">Order</button>
  <button class="tab" id="tab-history-btn">History</button>
</nav>

<div class="scroll-area">

  <!-- Hold-to-magnify area (js/hold-to-zoom.js): pinch to zoom the order/history
       content, release to spring back. The footer stays outside so it never scales. -->
  <div class="zoom-area">

  <!-- ORDER -->
  <section class="content active" id="tab-order">
    <!-- Action feedback only (e.g. "Order saved ✓"): starts empty/hidden. The
         connection state is NOT shown here anymore — see #orders-offline below. -->
    <p class="orders-status" id="orders-status" hidden></p>
    <div id="orders-alerts"></div>
    <div id="suppliers-list"></div>
    <button class="btn-primary" id="orders-placed-btn" hidden>Orders placed</button>
  </section>

  <!-- HISTORY -->
  <section class="content" id="tab-history">
    <div id="history-list"></div>
  </section>

  </div><!-- end .zoom-area -->

  <!-- Settings footer (mirrors the Calculator's bottom bar for a consistent app) -->
  <div class="recipe-footer">
    <button class="recipe-footer-btn" id="settings-footer-btn" type="button"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</button>
  </div>

</div>

<!-- Offline bar: shown ONLY while the device has no network connection
     (js/orders/orders-main.js toggles [hidden] on the browser online/offline
     events). Fixed to the bottom so it stays visible whatever the scroll. -->
<p class="orders-offline" id="orders-offline" role="status" hidden>You're offline — reconnect to load and save orders.</p>

<script type="module" src="js/sw-update.js"></script>
<script type="module" src="js/idle-reset.js"></script>
<script type="module" src="js/orders/boot.js"></script>
<script type="module" src="js/orders/orders-main.js"></script>
<script type="module" src="js/hold-to-zoom.js"></script>
</body>
</html>
