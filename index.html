<!--
  THE ITALIAN CLUB PWA — Home
  Landing screen: two large cards (Orders, Calculator).
  start_url of the PWA (see manifest.json). Reuses style.css; new styles in orders.css.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!--
  CSP bootstrap. A <meta> Content-Security-Policy cannot be loosened at runtime
  (multiple policies combine by intersection), so to allow the LOCAL Firebase
  emulator on localhost WITHOUT touching the live site's policy, the meta is
  emitted here. On the live domain the string is byte-identical to the production
  policy; on localhost only, connect-src additionally allows the Auth (9099) and
  Firestore (8080) emulators. This inline script runs before any CSP is in effect
  (only <meta charset> precedes it) and before any network request.
-->
<script>
(function () {
  var local = ['localhost', '127.0.0.1', '::1', '[::1]'].indexOf(location.hostname) !== -1;
  var emu = local
    ? ' http://localhost:8080 http://localhost:9099 http://127.0.0.1:8080 http://127.0.0.1:9099'
    : '';
  document.write(
    '<meta http-equiv="Content-Security-Policy" content="' +
    "default-src 'self'; " +
    "script-src 'self' https://www.gstatic.com https://www.google.com; " +
    "connect-src 'self' https://www.gstatic.com https://www.google.com https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com" + emu + "; " +
    "frame-src 'self' https://www.google.com; " +
    "img-src 'self' data:; " +
    "style-src 'self'; " +
    "font-src 'self'" +
    '">'
  );
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="The Italian Club bakery app — dough calculator, recipe catalogue and weekly supplier orders.">
<meta name="theme-color" content="#2D5016">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Italian Club">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="orders.css">
<title>The Italian Club</title>
</head>
<body>
